<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score keeper Game</title>
    <link rel="stylesheet" href="04-Score_keeper.css">
</head>
<body>

    <section class="main">

        <div id="img">
            <img src="https://blattbilliards.com/cdn/shop/articles/two-ping-pong-paddles-and-ball-on-blue-ping-pong-table_9cf060e3-0b77-455f-bfe7-8c5890bcc452_1024x.jpg?v=1748880436" alt="Ping Pong Paddle">
        </div>
        <div id="h1">
            <h1>Ping Pong Score Keeper</h1>
        </div>
        

        <h2><span id="p1Display">0</span> to <span id="p2Display">0</span></h2>

        <p>Use the buttons below to keep score.</p>
    <div id="selectDiv">
        <b class="para">Playing to</b>
        <select name="" id="select">
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="7">7</option>
        <option value="10">10</option>
        <option value="15">15</option>
    </select>
    </div>

    <div id="playBtn">
    <button id="p1Btn">+1 player one</button>
    <button id="p2Btn">+2 player two</button>
    <button id="resetBtn">Reset</button>
    </div>

    </section>
    
    

    
    
    <script src="04-Score_keeper.js"></script>
</body>
</html>
